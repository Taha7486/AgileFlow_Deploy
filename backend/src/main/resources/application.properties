# Application
spring.application.name=agileflow-backend
server.port=8080

# PostgreSQL (Supabase)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/agileflow_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=false

# JWT
jwt.secret=agileflow_secret_key_very_long_and_secure_2025
jwt.expiration=900000
jwt.refresh-expiration=604800000

# OAuth2 Google / GitHub (configurés via variables d'environnement)
app.frontend-url=${APP_FRONTEND_URL:http://localhost:5173}
# Google Console redirect URI: http://localhost:8080/login/oauth2/code/google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,email,profile
# GitHub OAuth App callback URL: http://localhost:8080/login/oauth2/code/github
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:}
spring.security.oauth2.client.registration.github.scope=read:user,user:email

# Mail (configuré via variables d'environnement)
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from-name=AgileFlow Support

# GitHub Integration
github.api.base-url=https://api.github.com
github.webhook.base-url=${app.frontend-url}ll