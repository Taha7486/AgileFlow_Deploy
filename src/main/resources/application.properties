# ?? Application ??
spring.application.name=agileflow-backend
server.port=8080

# ?? MySQL ??
spring.datasource.url=jdbc:mysql://localhost:3306/agileflow_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ?? JPA / Hibernate ??
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
# ?? JWT ??
jwt.secret=agileflow_secret_key_very_long_and_secure_2025
jwt.expiration=900000
jwt.refresh-expiration=604800000

# ?? Mail ??
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=TON_EMAIL@gmail.com
spring.mail.password=TON_APP_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true